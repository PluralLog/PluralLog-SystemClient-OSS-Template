name: plurallog_system_template
description: >
  Open-source template for building a PluralLog-compatible system client.
  Demonstrates the PluralLog data format, federation protocol, and core features.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  path_provider: ^2.1.5
  path: ^1.9.1

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

  # UI
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  share_plus: ^10.1.4

  # Cryptography (for federation)
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2
  flutter_secure_storage: ^9.2.4

  # Networking (for federation)
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
